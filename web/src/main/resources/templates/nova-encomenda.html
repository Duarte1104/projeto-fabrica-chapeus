<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Encomenda - Área do Cliente</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>

<div class="client-layout">

    <aside class="client-sidebar">
        <div class="sidebar-brand">
            <h1>Fábrica de Chapéus</h1>
            <p>Área do Cliente</p>
        </div>

        <nav class="sidebar-menu">
            <a th:href="@{/cliente}">Dashboard</a>
            <a th:href="@{/catalogo}">Catálogo</a>
            <a th:href="@{/nova-encomenda}" class="active">Nova Encomenda</a>
            <a th:href="@{/encomendas}">Minhas Encomendas</a>
            <a th:href="@{/faturas}">Faturas</a>
            <a th:href="@{/perfil}">Perfil</a>
        </nav>

        <a th:href="@{/logout}" class="sidebar-logout">Sair</a>
    </aside>

    <main class="client-main">

        <header class="client-topbar">
            <div>
                <h2>Nova Encomenda</h2>
                <p>Adicione um ou vários chapéus à mesma encomenda.</p>
            </div>
        </header>

        <section class="content-card">
            <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

            <form method="post" th:action="@{/nova-encomenda}" class="order-form">

                <div class="form-group">
                    <label for="dataEntrega">Data pretendida de entrega</label>
                    <input type="date" id="dataEntrega" name="dataEntrega" required>
                </div>

                <h3>Chapéus da encomenda</h3>

                <div id="linhas-container" class="order-lines-form">

                    <div class="order-line-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Chapéu</label>
                                <select name="codChapeu" required>
                                    <option value="">Selecionar chapéu</option>
                                    <option th:each="chapeu : ${chapeus}"
                                            th:value="${chapeu.cod}"
                                            th:text="${chapeu.nome + ' - ' + #numbers.formatDecimal(chapeu.precoactvenda, 1, 'POINT', 2, 'COMMA') + ' €'}">
                                        Chapéu
                                    </option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Quantidade</label>
                                <input type="number" name="quantidade" min="1" placeholder="Ex: 10" required>
                            </div>

                            <div class="form-group">
                                <label>Tamanho</label>
                                <select name="tamanho" required>
                                    <option value="">Selecionar tamanho</option>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Cores</label>
                                <input type="text" name="cores" placeholder="Ex: Preto, Branco" required>
                            </div>
                        </div>

                        <button type="button" class="remove-line-button" onclick="removerLinha(this)">
                            Remover chapéu
                        </button>
                    </div>

                </div>

                <button type="button" class="add-line-button" onclick="adicionarLinha()">
                    + Adicionar outro chapéu
                </button>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="design">
                        Preciso de personalização/design
                    </label>
                </div>

                <div class="form-group">
                    <label for="descricaoDesign">Descrição do design</label>
                    <textarea id="descricaoDesign" name="descricaoDesign" placeholder="Ex: logotipo bordado na frente, texto lateral, etc."></textarea>
                </div>

                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" placeholder="Ex: quero a aba preta e a parte superior branca..."></textarea>
                </div>

                <button type="submit" class="btn-primary">Submeter encomenda</button>
            </form>
        </section>
    </main>

</div>

<script>
    function adicionarLinha() {
        const container = document.getElementById("linhas-container");
        const primeiraLinha = container.querySelector(".order-line-form");
        const novaLinha = primeiraLinha.cloneNode(true);

        novaLinha.querySelectorAll("input").forEach(input => {
            if (input.type !== "checkbox") {
                input.value = "";
            }
        });

        novaLinha.querySelectorAll("select").forEach(select => {
            select.selectedIndex = 0;
        });

        container.appendChild(novaLinha);
        atualizarBotoesRemover();
    }

    function removerLinha(botao) {
        const container = document.getElementById("linhas-container");
        const linhas = container.querySelectorAll(".order-line-form");

        if (linhas.length <= 1) {
            return;
        }

        botao.closest(".order-line-form").remove();
        atualizarBotoesRemover();
    }

    function atualizarBotoesRemover() {
        const linhas = document.querySelectorAll(".order-line-form");
        const mostrar = linhas.length > 1;

        linhas.forEach(linha => {
            const botao = linha.querySelector(".remove-line-button");
            botao.style.display = mostrar ? "inline-flex" : "none";
        });
    }

    atualizarBotoesRemover();
</script>

</body>
</html>
