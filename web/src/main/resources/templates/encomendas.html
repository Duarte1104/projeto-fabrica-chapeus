<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minhas Encomendas</title>
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>

<div class="client-layout">

    <aside class="client-sidebar">

        <div class="sidebar-brand">
            <h1>Fábrica de Chapéus</h1>
            <p>Área do Cliente</p>
        </div>

        <nav class="sidebar-menu">
            <a th:href="@{/cliente}">Dashboard</a>
            <a th:href="@{/catalogo}">Catálogo</a>
            <a th:href="@{/nova-encomenda}">Nova Encomenda</a>
            <a th:href="@{/encomendas}" class="active">Minhas Encomendas</a>
            <a th:href="@{/faturas}">Faturas</a>
            <a th:href="@{/perfil}">Perfil</a>
        </nav>

        <a th:href="@{/logout}" class="sidebar-logout">Sair</a>

    </aside>

    <main class="client-main">

        <header class="client-topbar">

            <div>
                <h2>Minhas Encomendas</h2>
                <p>Acompanhe o estado das suas encomendas.</p>
            </div>

            <a th:href="@{/nova-encomenda}" class="btn-header">
                Nova Encomenda
            </a>

        </header>

        <div class="alert alert-success"
             th:if="${sucesso}"
             th:text="${sucesso}">
        </div>

        <div class="alert alert-error"
             th:if="${erro}"
             th:text="${erro}">
        </div>

        <section class="orders-grid">

            <article class="modern-order-card"
                     th:each="item : ${encomendas}">

                <div class="modern-order-top">

                    <div>
                        <span class="modern-order-number">
                            Encomenda #<span th:text="${item.encomenda.num}"></span>
                        </span>

                        <h3 th:text="${item.estadoTexto}">
                            Estado
                        </h3>
                    </div>

                    <span class="modern-order-status"
                          th:classappend="${item.encomenda.idestado == 1 ? ' status-design' : (item.encomenda.idestado == 2 ? ' status-production' : ' status-finished')}">

                        <span th:text="${item.estadoTexto}"></span>

                    </span>

                </div>

                <div class="modern-order-info">

                    <div>
                        <span>Entrega</span>
                        <strong th:text="${item.encomenda.dataEntrega}"></strong>
                    </div>

                    <div>
                        <span>Valor</span>
                        <strong th:text="${#numbers.formatDecimal(item.encomenda.valortotal, 1, 'POINT', 2, 'COMMA') + ' €'}">
                            0,00 €
                        </strong>
                    </div>

                    <div>
                        <span>Tipo</span>
                        <strong th:text="${item.encomenda.design ? 'Com design' : 'Sem design'}"></strong>
                    </div>

                </div>

                <div class="modern-order-footer">

                    <span>
                        <strong th:text="${#lists.size(item.linhas)}"></strong>
                        linhas
                    </span>

                    <a class="details-button"
                       th:href="@{/encomendas/{id}(id=${item.encomenda.num})}">

                        Ver detalhes

                    </a>

                </div>

            </article>

        </section>

    </main>

</div>

</body>
</html>
